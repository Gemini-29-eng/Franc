<!DOCTYPE html>
<html>
<head>
  <title>Franc - Moteur de recherche</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    input {
      width: 300px;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🔎 Franc</h1>

  <input type="text" id="search" placeholder="Rechercher...">
  <button onclick="search()">Go</button>

  <script>
    function search() {
      let query = document.getElementById("search").value;
      window.location.href = "https://www.google.com/search?q=" + query;
    }
  </script>

</body>
</html>
